<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформлення замовлення</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <h1>Оформлення замовлення</h1>

    <nav>
        <a href="menu.html">Меню</a>
        <a href="gallery.html">Галерея</a>
        <a href="contacts.html">Контакти</a>
        <a href="order.html">Замовити</a>
    </nav>

</header>

<section class="text-block order-text">

    <p>
        Заповніть форму нижче, щоб зробити замовлення.
        Ми зв'яжемося з вами для уточнення деталей.
    </p>

    <p>
        Ви можете обрати тип десерту, дату отримання та інші параметри.
    </p>

</section>

<section class="order-section">

    <form class="order-form">

        <label>Ім'я:</label>
        <input type="text">

        <label>Email:</label>
        <input type="email">

        <label>Телефон:</label>
        <input type="tel">

        <label>Дата замовлення:</label>
        <input type="date">

        <label>Оберіть десерт:</label>

        <select>
            <option>Торт</option>
            <option>Капкейки</option>
            <option>Печиво</option>
            <option>Святкові десерти</option>
        </select>

        <label>Ваші побажання:</label>

        <textarea></textarea>

        <input type="submit" value="Замовити">

    </form>

    <img class="order-cake7" src="images/cake7.jpg" alt="Десерт">

    <div class="bottom-text">
        Ми гарантуємо якість та свіжість кожного десерту
    </div>

</section>

</body>
</html>
